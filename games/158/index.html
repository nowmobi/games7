    <style type="text/css">
        body {
            margin: 0;
            background-color: #81b6ea;
            -webkit-touch-callout: none !important;
            /* prevent callout to copy image, etc when tap to hold */
            -webkit-text-size-adjust: none !important;
            /* prevent webkit from resizing text to fit */
            -webkit-user-select: none !important;
            /* prevent copy paste, to allow, change 'none' to 'text' */
        }

        #wrongRotation {
            display: none;
            z-index: 20;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 1);
            touch-action: none;
        }

        #wrongRotation img {
            display: block;
            width: 30%;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            top: 40%;
            -webkit-transform: translateY(-50%);
            -ms-transform: translateY(-50%);
            transform: translateY(-50%);
            touch-action: none;
        }

        @font-face {
            font-family: 'bebas_font';
            font-style: normal;
            font-weight: 400;
            src: url('assets/fnt/Dharma Type - Bebas Neue Pro Regular.otf') format('opentype');
        }

        .shadowed {
            box-shadow: 0px 0px 15px 0px rgba(0, 0, 0, 0.75);
        }
		#links #imgr {
            position: absolute;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            animation: rotatei 4s infinite;
        }

        .imgs {
            position: absolute;
            z-index: 999999999;
            right: 120px;
            top: 10px;
        }

        .arrow {
            position: absolute;
            left: 14px;
            top: 1px;
            animation: uptop 1s infinite;
            -webkit-animation: uptop 1s infinite;
            -moz-animation: uptop 1s infinite;
        }

        @keyframes uptop {
            0% {
                top: 1px;
            }
            50% {
                top: 25px;
            }
            100% {
                top: 1px;
            }
        }

        @keyframes rotatei {
            0% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            25% {
                -webkit-transform: rotate(10deg) scale(1.3);
                -moz-transform: rotate(10deg) scale(1.3);
                -ms-transform: rotate(10deg) scale(1.3);
                -o-transform: rotate(10deg) scale(1.3);
                transform: rotate(10deg) scale(1.3);
            }
            50% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            75% {
                -webkit-transform: rotate(-10deg) scale(1.3);
                -moz-transform: rotate(-10deg) scale(1.3);
                -ms-transform: rotate(-10deg) scale(1.3);
                -o-transform: rotate(-10deg) scale(1.3);
                transform: rotate(-10deg) scale(1.3);
            }
            100% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
        }
    </style>







    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],

    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>
