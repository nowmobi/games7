<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title data-i18n="title">贪吃蛇</title>
    <link rel="stylesheet" href="styles.css">

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
<body>
    <div id="gameContainer">
        <div id="scorePanel">
            <div class="segment-counter"><span data-i18n="score">总分</span>: <span  id="totalScore">0</span></div>
            <div id="segmentStats" class="segment-stats">
                <div class="segment-type red">
                    <img src="images/body-r.png" class="segment-icon">
                    <!-- <span class="color-label" data-i18n="stats.red">红色</span> -->
                    <span id="redCount">0</span>
                </div>
                <div class="segment-type blue">
                    <img src="images/body-b.png" class="segment-icon">
                    <!-- <span class="color-label" data-i18n="stats.blue">蓝色</span> -->
                    <span id="blueCount">0</span>
                </div>
                <div class="segment-type yellow">
                    <img src="images/body-y.png" class="segment-icon">
                    <!-- <span class="color-label" data-i18n="stats.yellow">黄色</span> -->
                    <span id="yellowCount">0</span>
                </div>
            </div>
        </div>
        <div id="startScreen">
            <div class="game-title" data-i18n="title">贪吃蛇</div>
            <div class="game-logo">
                <img src="images/head1.png" alt="Snake Logo" class="logo-image">
            </div>
            <button id="startButton" data-i18n="startGame">开始游戏</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

            <span>控制移动方向</span>
        </div>
    </div> -->
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "s3qipzsmowz03sobcyid3h15cn3zssfv",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk"); 
    </script>
    <script type="module" src="js/game.js"></script>
</body>
