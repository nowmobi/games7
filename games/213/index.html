  <script type="text/javascript">
   window.SDK_OPTIONS = {
      gameId: "48momzh4kkuigno6ogqd4mgvbcd9rqsv",
      onEvent: function (a) {
         switch (a.name) {
            case "SDK_GAME_PAUSE":
               // pause game logic / mute audio
			   cc && cc.audioEngine.pauseAll();    
			  window.gamesetting && window.gamesetting.StopBGM();
			  window.isAdPlaying = true;
			  cc && cc.director.pause();
               break;
            case "SDK_GAME_START":
               // advertisement done, resume game logic and unmute audio
				cc && cc.audioEngine.resumeAll();
				window.gamesetting && window.gamesetting.ApplyMusic();
				window.isAdPlaying = false;
				cc && cc.director.resume();
               break;
            case "SDK_READY":
               // when sdk is ready
               break;
         }
      }
   };

})(document, "script", "gamemonetize-sdk"); 
</script>


    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  <script type="text/javascript">
    var file_settings = "src/settings.a3e89.js";
    var file_main = "main.ffcf7.js";

    var loadSingleScript = function (src, callback) {
        var s = document.createElement('script');
        s.async = false;
        s.src = src;
        s.charset = 'utf-8';
        s.addEventListener('load', function () {
            s.parentNode.removeChild(s);
            s.removeEventListener('load', arguments.callee, false);
            callback();
        }, false);
        document.body.appendChild(s);
    };
    function setting_js_load() {
        loadSingleScript(file_main, function () { });
    }

    loadSingleScript(file_settings, setting_js_load);
  </script>
