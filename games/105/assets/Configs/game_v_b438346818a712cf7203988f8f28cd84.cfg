; This file contains all the configurations for the games regrouped by sections.

[game]
; Spawn a wave every spawnRate seconds.
spawnRate = 4
; Velocity increment throughout the levels
velocityInc = 9
; Base time to get a pizza cooked
baseCookTime = 3
; Base time to get a pizza burnt
baseBurnTime = 9
; Base time for the game in seconds.
baseGameTime = 300
; Minimum distance for a swipe to cut/play Mike's animation
minimumCutDistance = 10

[cuttables]
; Number of cuttables to spawn for sure on every wave.
baseSpawnNbr = 3
; Random modifier to have variety in the number of spawn
spawnModifier = 5
; Starting number of ingredients on the pizza.
startingDressing = 10
; Total number of dressings in a pizza per level. (e.g. Level 1 = 10 Level 2 = 20 and so on)
dressingPerLevel = 10
; Time in milliseconds inbetween each cuttables spawn.
timeBetweenSpawn = 300
; Order the bad ingredients will start showing up.
badIngredientOrderStart = 3
; Base show up rate of the bad ingredients 
baseBadShowUp = 5
; Percentage by order increase
badShowUpIncrease = 0.5

[specials]
; Appearance rate in percentage of special balls.
; FIXME: Don't set this any higher than 0 this will break the build atm
specialShowRate = 0
; Slowdown ratio of the ice ball cuttable
slowdownRatio = 3
; Duration of the slowdown effect
slowdownDuration = 3
; Spawn multiplier duration
spawnMultDuration = 5
; Spawn multiplier value
spawnMultValue = 3

; Section containing the point value of the ingredients.
[ingredients]
pepperoni = 50
cheese = 50
mushrooms = 50
anchovies = 50
jellybeans = 50
jalapenos = 50
seaweed = 50
iceball = 1000

; Pizza sections
; Number of ingredients per pizza and time bonus per pizza completed
[pepperoniCheese]
pepperoni = 5
cheese = 5
timeBonus = 10

[vegetarian]
cheese = 7
mushrooms = 7
seaweed = 7
timeBonus = 20

[mikeySpecial]
cheese = 10
anchovies = 10
jellybeans = 10
jalapenos = 10
timeBonus = 35