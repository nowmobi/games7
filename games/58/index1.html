<!DOCTYPE HTML>
<html>

<head>

    <meta name='viewport' content='width = device-width, initial-scale=1, maximum-scale=1.01, minimal-ui' />
    <script>
        window.addEventListener("load", function() {
            function onTouchPreventDefault(event) {
                event.preventDefault();
            };
            document.addEventListener("touchmove", onTouchPreventDefault, false);
            document.addEventListener("touchstart", onTouchPreventDefault, false);
        }, false);
        window.addEventListener('scroll', function() {
            document.body.scrollTop = 0;
        }, true);
        window.addEventListener('resize', function() {
            document.body.scrollTop = 0;
        }, true);
    </script>
    <style>
        BODY,
        HTML {
            -webkit-touch-callout: none;
            -webkit-text-size-adjust: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            font-family: Arial, Verdana, sans-serif;
            font-size: 12px;
            font-size: 12px;
            font-weight: normal;
            color: #ccc;
            overflow: hidden;
            background-image: url("assets/big_bg_game22.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
    </style>
    <script src="js/phaser.min.js"></script>
    <script src="publisher.js"></script>
	
	
	
</head>

</body>

</html>
