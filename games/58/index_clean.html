<!DOCTYPE HTML>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Fruits Pop</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name='viewport' content='width = device-width, initial-scale=1, maximum-scale=1.01, minimal-ui' />
    <script>
        window.addEventListener("load", function() {
            function onTouchPreventDefault(event) {
                event.preventDefault();
            };
            document.addEventListener("touchmove", onTouchPreventDefault, false);
            document.addEventListener("touchstart", onTouchPreventDefault, false);
        }, false);
        window.addEventListener('scroll', function() {
            document.body.scrollTop = 0;
        }, true);
        window.addEventListener('resize', function() {
            document.body.scrollTop = 0;
        }, true);
    </script>
    <style>
        BODY,
        HTML {
            -webkit-touch-callout: none;
            -webkit-text-size-adjust: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            font-family: Arial, Verdana, sans-serif;
            font-size: 12px;
            font-size: 12px;
            font-weight: normal;
            color: #ccc;
            overflow: hidden;
            background-image: url("assets/big_bg_game22.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
    </style>
    <script src="js/phaser.min.js"></script>
    <script src="publisher.js"></script>
	
	
	

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

<body>
     <script src="js/game.min.js"></script>
	 
	 
	 <div id="gameContainer" style="width: 100%; height: 100%;">
        <div id="content"></div>
        <a href="vodogame.com" onclick="window.open('https://vodogame.com'); return false;"><img src="logo.png" style="bottom:0%;right:0%;position:absolute;width:50px;transform:translate(-5%,2%);cursor:pointer;height:auto;max-width:30%;z-index:80%" alt="vodogame.com"></a>
    </div>
	 
	 
	
</body>

</html>
