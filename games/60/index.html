<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>Bejeweled Classic</title>
    <style>
        html,
        body {
            padding: 0;
            border: 0;
            margin: 0;
            height: 100%;
        }
    </style>
    <script>
        window["GD_OPTIONS"] = {
            "gameId": "yxs38xpu1xx3x50smruyi1amuo67afw9",
            "onEvent": function(event) {
                switch (event.name) {
                    case "SDK_GAME_START":
                        window['GD_OPTIONS'].SDK_GAME_START();
                        break;
                    case "SDK_GAME_PAUSE":
                        window['GD_OPTIONS'].SDK_GAME_PAUSE();
                        // pause game logic / mute audio
                        break;
                    case "SDK_GDPR_TRACKING":
                        // this event is triggered when your user doesn't want to be tracked
                        break;
                    case "SDK_GDPR_TARGETING":
                        // this event is triggered when your user doesn't want personalised targeting of ads and such
                        break;
                }
            }
        };
        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s);
            js.id = id;
            js.src = 'https://api.gamemonetize.com/sdk.js';
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'gamemonetize-sdk'));
    </script>
	<style>
        #links #imgr {
            position: absolute;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            animation: rotatei 4s infinite;
        }

        .imgs {
            position: absolute;
            z-index: 999999999;
            right: 120px;
            top: 10px;
        }

        .arrow {
            position: absolute;
            left: 14px;
            top: 1px;
            animation: uptop 1s infinite;
            -webkit-animation: uptop 1s infinite;
            -moz-animation: uptop 1s infinite;
        }

        @keyframes uptop {
            0% {
                top: 1px;
            }
            50% {
                top: 25px;
            }
            100% {
                top: 1px;
            }
        }

        @keyframes rotatei {
            0% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            25% {
                -webkit-transform: rotate(10deg) scale(1.3);
                -moz-transform: rotate(10deg) scale(1.3);
                -ms-transform: rotate(10deg) scale(1.3);
                -o-transform: rotate(10deg) scale(1.3);
                transform: rotate(10deg) scale(1.3);
            }
            50% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            75% {
                -webkit-transform: rotate(-10deg) scale(1.3);
                -moz-transform: rotate(-10deg) scale(1.3);
                -ms-transform: rotate(-10deg) scale(1.3);
                -o-transform: rotate(-10deg) scale(1.3);
                transform: rotate(-10deg) scale(1.3);
            }
            100% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="gamePlace" style="height:100%;"></div>
    <script src="build/pixi.js?1326b5d6d4d807474e84"></script>
    <script src="build/main.js?1326b5d6d4d807474e84"></script>
	<div class="imgs">
        <a id="links" href="" target="_blank">
        <img  id="imgr" class="imgr" src="" alt="">
        <img  class="arrow" src="./imgs/arrow.png" width="45px" height="45px" alt="">
       </a>

    </div>
    <script src="./main.js"></script>

</body>

                case "SDK_GAME_PAUSE":

                    break;
                case "SDK_READY":
                    // when sdk is ready
                    break;
            }
        }
    };
    (function(a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk");
</script>
<script type="text/javascript">
    function google_analytics() {
        if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
            sdk.showBanner();
        }
    };

    function google_analytics_ID() {
        if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
            sdk.showBanner();
        }
    };
    setTimeout(function() {
        google_analytics();
    }, 1000);

</html>
