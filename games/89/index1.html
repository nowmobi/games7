<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Cook It 3D</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
      <div id="overlay-clip" class="overlay">
        <div id="overlay" class="overlay-layer"></div>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
      </div>
      <div id="counter" class="counter">
        <p id="loadingInfo" style="position: relative; top: 28px">LOADING</p>
        <h1 id="progressC">0%</h1>
        <div id="ProgressLineB" class="ProgressLineB"></div>
        <div id="ProgressLine" class="ProgressLine"></div>
      </div>
    </div>
    <div id="loadingBox">
      <div class="vertical-centered-box">
        <div class="content">
          <div class="loader-circle"></div>
          <div class="loader-line-mask">
            <div class="loader-line"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/9853637125e801e9aae48e78dbbdcfca.loader.js";
      var config = {
        dataUrl: buildUrl + "/4a6226db0a3faf363c252e185f11208c.data.unityweb",
        frameworkUrl:
          buildUrl + "/63d2c52fa4e9062673a20c28ad90cfdc.framework.js.unityweb",
        codeUrl: buildUrl + "/f6a8c0e279d42d1413d1b3b399dd1eba.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CyberGoldfinch",
        productName: "Cook It 3D",
        productVersion: "1",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var loadingBar = document.querySelector("#unity-loading-bar");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }
      loadingBar.style.display = "block";
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          if (progress == 1) {
            document.getElementById("ProgressLine").style.width =
              200 * progress + "px";
            document.getElementById("loadingInfo").innerHTML = "LOADING";
            document.getElementById("progressC").innerHTML =
              Math.floor(100 * progress) + "%";
          } else {
            document.getElementById("loadingInfo").innerHTML = "DOWNLOADING";
            document.getElementById("progressC").innerHTML =
              Math.floor(100 * progress) + "%";
            document.getElementById("ProgressLine").style.width =
              200 * progress + "px";
          }
        })
          .then((unityInstance) => {
            $("#overlay")
              .delay(350)
              .animate({ "margin-left": "-=1700" }, "slow")
              .fadeOut();
            $("#overlay-clip")
              .delay(350)
              .animate({ opacity: 0 }, "slow")
              .fadeOut();
            $("#counter")
              .delay(200)
              .animate({ opacity: 0, "margin-top": "-=100" }, 150, function () {
                $(this).css("display", "none");
              });
            $("#loadingBox")
              .delay(200)
              .animate(
                { "margin-top": "+=100", opacity: 0 },
                "200",
                function () {
                  $(this).css("display", "none");
                },
              );
            loadingBar.style.display = "none";
          })
          .catch((message) => {
            alert(message);
          });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
