<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | kinder Garden Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-mobile-warning">
        WebGL builds are not supported on mobile devices.
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">kinder Garden Game</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Cupcake_Kinder.loader.js";
      var config = {
        dataUrl: buildUrl + "/Cupcake_Kinder.data",
        frameworkUrl: buildUrl + "/Cupcake_Kinder.framework.js",
        codeUrl: buildUrl + "/Cupcake_Kinder.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CupCake Inc",
        productName: "kinder Garden Game",
        productVersion: "0.1",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var mobileWarning = document.querySelector("#unity-mobile-warning");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
        mobileWarning.style.display = "block";
        setTimeout(() => {
          mobileWarning.style.display = "none";
        }, 5000);
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }
      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  
</body>
</html>
