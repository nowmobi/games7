<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="content-type" content="text/html; charset=UTF8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#382C2A">
    <meta name="viewport" content="height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui" />
    <title>Papa Burgeria</title>
    <script type="text/javascript" src="./js/PapasBurgeria.js"></script>
    <script src="jquery.js"></script>
    <script type="text/javascript" src="./js/loader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        canvas {
            outline: none
        }

        html,
        body,
        #container {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #splash {
            position: absolute;
            visibility: hidden;
            z-index: 10;
        }

        #splash__image {
            position: absolute;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url("assets/todo.jpg");
            visibility: visible;
            transition: all 0.5s;
            z-index: 10;
        }

        #progress__root {
            position: absolute;
        }

        #progress__line {
            width: 0;
            height: 100%;
            transition: all 0.5s;
        }

        
		.floating {
    
    position: absolute;
    
    animation-name: floating;
    animation-duration: 1.5s;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    
    
    }
    
    @keyframes floating {
    from {
        transform: translate(0, 0px);
    }
    
    65% {
        transform: translate(0, 15px);
    }
    
    to {
        transform: translate(0, -0px);
    }
    }
    
    </style>
    <script type="text/javascript" src="//m.igroutka.ru/files/scripts/scr.js"></script>
</head>

<body>
    <div id="splash__image">
        <div id="progress__root">
            <div id="progress__line"></div>
        </div>
    </div>

    <div id="1-1" class="floating" style="width:100px;height:100px;z-index:9999999;position:absolute;top:20px;right:48%"><a target="_blank" 
        href="https://superkidgames.com" title="Five Nights at Freddy’s Games"><img src="https://fonts.gq/images/fontv2.gif
        " style="cursor:pointer;" alt="Five Nights at Freddy’s Games" width="135" height="68"></a></div>

    <script>
        window.addEventListener("load", () => {

            PokiSDK.init().then(
                () => {
                    // successfully initialized
                    onPokiInitComplete(false);
                }
            ).catch(
                () => {
                    // successfully initialized but the user has adblock
                    onPokiInitComplete(true);
                }
            );

            let config;

            config = {
                "key": "papa_burgeria",
                "title": "Papa Burgeria",
                "filename": "papa_burgeria_sdk",
                "pokiSDK": true,
                "debugPoki": false,
                "showFPS": false,
                "debug": false,
                "splash": "assets/todo.jpg",
                "start": null,
                "width": 500,
                "height": 374,
                "x": 0,
                "y": 0,
                "w": "100%",
                "h": "100%",
                "stageScaleMode": null,
                "stageAlign": null,
                "progressParserWeigth": 1,
                "progress": {
                    "direction": "lr",
                    "back": "#fff",
                    "line": "#8a6447",
                    "rect": [
                        0.1,
                        0.7,
                        0.8,
                        0.025
                    ]
                },
                "skipFramesOfScene": null,
                "buttonPokiSDKActions": null,
                "retryButtonIDS": null,
                "retryButtonAction": null,
                "actionOnStop": null,
                "actionWhenRetryButtonEncountered": null,
                "binary": [{
                        "name": "fonts.swf",
                        "path": "assets/fonts.swf",
                        "size": 30506
                    },
                    {
                        "name": "papa_burgeria_sdk",
                        "path": "assets/papa_burgeria_sdk.swf",
                        "size": 4365180,
                        "resourceType": "GAME"
                    }
                ],
                "runtime": "js/PapaSeries.js"
            };

            PokiSDK.setDebug(config.debugPoki);

            Loader.init(config);

            let onPokiInitComplete = (adBlocked) => {

                PokiSDK.adBlocked = adBlocked;
                PokiSDK.gameLoadingStart();

                Loader.runGame((fill) => {
                    PokiSDK.gameLoadingProgress({
                        percentageDone: fill,
                        kbLoaded: 0,
                        kbTotal: 0,
                        fileNameLoaded: "",
                        filesLoaded: 0,
                        filesTotal: 0
                    });
                }, (instance) => {
                    PokiSDK.gameLoadingFinished();
                })
            }
        })
    </script>

    </html>
