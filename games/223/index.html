    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/LadybugCookingCupcake.json", {
            onProgress: UnityProgress
        });
        var scaleToFit;
        try {
            scaleToFit = !!JSON.parse("");
        } catch (e) {
            scaleToFit = true;
        }
        window.onresize = function() {
            var canvas = gameInstance.Module.canvas;
            var container = gameInstance.container;
            var w;
            var h;

            if (scaleToFit) {
                w = window.innerWidth;
                h = window.innerHeight;

                var r = 768 / 432;

                if (w * r > window.innerHeight) {
                    w = Math.min(w, Math.ceil(h / r));
                }
                h = Math.floor(w * r);
            } else {
                w = 432;
                h = 768;
            }

            container.style.width = canvas.style.width = w + "px";
            container.style.height = canvas.style.height = h + "px";
            container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
            container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
        }
    </script>

    <script>
        // 阻止广告加载函数
        window.google_ad_client = undefined;
        window.adsbygoogle = [];
        
        // 定期清除动态插入的广告元素
        setInterval(function() {
            var adSelectors = [
                '#imaContainer',
                '#imaContainer_new', 
                '#sdk__advertisement',
                '#gmLoadingText',
                'iframe[src*="imasdk"]',
                'iframe[src*="doubleclick"]',
                'iframe[src*="googlesyndication"]',
                'iframe[title="Advertisement"]',
                'div[id*="google_ads"]',
                'div[id*="aswift"]',
                'div[id*="google_image_div"]',
                'div[id*="google_ads_frame"]',
                'div[id^="ad-container"]',
                'div[id^="google_ads"]',
                '.adsbygoogle',
                '.google-ad',
                '.ad-banner',
                '.ad-container'
            ];
            
            adSelectors.forEach(function(selector) {
                var elements = document.querySelectorAll(selector);
                elements.forEach(function(el) {
                    if (el && el.parentNode) {
                        el.parentNode.removeChild(el);
                    }
                });
            });

            // 阻止广告SDK函数
            if (window.sdk_init) window.sdk_init = function() {};
            if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
            if (window.adBreak) window.adBreak = function() {};
            if (window.adConfig) window.adConfig = function() {};
            if (window.showAd) window.showAd = function() {};
            if (window.loadAd) window.loadAd = function() {};
        }, 500);
    </script>
