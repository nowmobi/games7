<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
    
    <title>625 Sandwich Stacker Mobile</title>
    
    <link rel="stylesheet" href="css/game.css">
    <script src="js/phaser.min.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/gameplay.js"></script>
    <script src="js/gameover.js"></script>
    <script src="js/nextlevel.js"></script>
    <script src="js/game.js"></script>

    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "fi9tq41y1fdxjic2q0aerphxg4af4k7e",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                    // pause game logic / mute audio
                    break;
                    case "SDK_GAME_START":
                    // advertisement done, resume game logic and unmute audio
                    break;
                    case "SDK_READY":
                    // when sdk is ready
                    break;
                }
            }
        };
        (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk"); 
    </script>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

<body>
    <div id="thegame"></div>
    <!-- load the font before the game starts -->
    <div style="font-family: 'SFSlapstickComic'; position:absolute; left:-1000px; visibility:hidden;">.</div>
</body>
</html>
